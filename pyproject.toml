[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["aetherlab/data/outputs/*"]

[tool.ruff.lint]
extend-select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E501", "E402", "E702"]

[tool.ruff.lint.isort]
known-first-party = ["aetherlab"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
