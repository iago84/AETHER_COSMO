version: "3.9"
services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    environment:
      - AETHERLAB_DB_URL=postgresql+psycopg2://aether:aether@db:5432/aetherlab
      - REDIS_URL=redis://redis:6379/0
      - AETHERLAB_API_KEY=${AETHERLAB_API_KEY:-}
      - AETHERLAB_CLEANUP_DAYS=${AETHERLAB_CLEANUP_DAYS:-30}
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn aetherlab.apps.api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      - db
      - redis
    restart: unless-stopped
  worker:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - AETHERLAB_DB_URL=postgresql+psycopg2://aether:aether@db:5432/aetherlab
      - REDIS_URL=redis://redis:6379/0
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python scripts/rq_worker.py"
    depends_on:
      - redis
      - db
    restart: unless-stopped
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=aether
      - POSTGRES_PASSWORD=aether
      - POSTGRES_DB=aetherlab
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d aetherlab"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
volumes:
  pgdata:
