name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke test
        env:
          MPLBACKEND: Agg
        run: |
          python - << 'PY'
          import os, numpy as np
          os.environ["MPLBACKEND"] = "Agg"
          from aetherlab.packages.aether_sim.simulator2d import Simulator2D
          from aetherlab.packages.aether_sim.sources import gaussian_pulse
          from aetherlab.packages.aether_sim.metrics import compute_metrics
          sim = Simulator2D(nx=32, ny=32, steps=5, dt=0.05, lam=0.5, diff=0.2, noise=0.0, seed=42)
          cx, cy = 16, 16
          sim.set_source(lambda x, y, t: gaussian_pulse(x, y, t, cx, cy, sigma=4.0, duration=3, amplitude=1.0))
          sim.run()
          m = compute_metrics(sim.u)
          assert "energy" in m and np.isfinite(m["energy"]), "Energy metric invalid"
          print("OK", m["energy"])
          PY
