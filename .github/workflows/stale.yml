name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: "Este issue está inactivo. Se cerrará si no hay actividad."
          stale-pr-message: "Este PR está inactivo. Se cerrará si no hay actividad."
          exempt-issue-labels: "security,critical"
          exempt-pr-labels: "security,critical"
